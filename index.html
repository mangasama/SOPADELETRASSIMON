<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2994A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>Sopa de Letras Electoral - IEE Sonora</title>
<style>
  :root{
    --crema:#FBE9CE;
    --crema2:#F6DDB5;
    --naranja:#F2994A;
    --naranja2:#EF8B2C;
    --cafe:#5C4430;
    --cafe2:#3E2E20;
    --verde:#5FD068;
    --verde2:#3FAE4B;
    --amarillo:#FFD86B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Segoe UI',Verdana,sans-serif;overflow:hidden;background:#222;}
  #app{position:relative;width:100vw;height:100vh;overflow:hidden;}

  .screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;}
  .screen.active{display:flex;}

  /* ---------- INICIO ---------- */
  #screen-inicio{
    background-image:url('assets/bg1.jpg');background-size:cover;background-position:center;
  }
  #screen-inicio .velo-inicio{position:absolute;inset:0;background:rgba(30,18,6,.12);}
  #inicio-wrap{position:relative;z-index:2;max-width:80%;max-height:88%;}
  #inicio-img{display:block;width:100%;height:auto;filter:drop-shadow(0 10px 18px rgba(0,0,0,.35));}
  #btn-empezar{
    position:absolute;left:67%;top:60%;transform:translate(-50%,-50%);
    font-size:1.09em;font-weight:800;color:#fff;
    background:linear-gradient(#D9A83A,#B8841F);
    border:2px solid #a8791f;border-radius:50px;padding:10px 36px;
    cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.35);
    letter-spacing:.5px;text-transform:uppercase;transition:transform .1s;display:flex;align-items:center;gap:8px;white-space:nowrap;
  }
  #btn-empezar:before{content:"";width:0;height:0;border-style:solid;border-width:6px 0 6px 10px;border-color:transparent transparent transparent #fff;}
  #btn-empezar:active{transform:translate(-50%,-50%) translateY(3px);}

  /* ---------- JUEGO ---------- */
  #screen-juego{background-size:cover;background-position:center;transition:background-image .4s, opacity .3s ease;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:150px;}
  #maincontent{position:relative;z-index:2;flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:0;}
  #velo{position:absolute;inset:0;background:rgba(40,25,10,.28);}

  #logo-img{position:absolute;z-index:3;top:16px;left:50%;transform:translateX(-50%);height:130px;object-fit:contain;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));}
  #btn-sound{position:absolute;z-index:3;top:16px;right:16px;width:44px;height:44px;border-radius:50%;background:#fff8ea;border:3px solid var(--naranja);font-size:1.2em;cursor:pointer;box-shadow:0 4px 8px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;}

  #banner{
    position:relative;z-index:2;
    width:min(1000px,94%);min-height:104px;margin-bottom:14px;
    background:#fff;
    border:3px solid var(--naranja);border-radius:16px;
    display:flex;align-items:center;gap:18px;padding:14px 22px;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
    opacity:0;transition:opacity .35s;
  }
  #banner.show{opacity:1;}
  #banner.bonus{border-color:var(--amarillo);background:#fffbe8;}
  #banner.bonus .texto b{color:#c9950c;}

  #bonus-overlay{
    position:absolute;z-index:5;inset:0;display:none;
    align-items:center;justify-content:center;
    opacity:0;transition:opacity .3s ease;
  }
  #bonus-overlay.show{display:flex;opacity:1;}
  #bonus-overlay video{
    width:70%;max-width:820px;height:auto;
    object-fit:contain;
    opacity:.8;
    border-radius:14px;
  }

  #story-overlay{
    position:fixed;z-index:50;inset:0;display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:16px;
    background:rgba(10,6,2,.85);
    opacity:0;transition:opacity .3s ease;
  }
  #story-overlay.show{display:flex;opacity:1;}
  #story-overlay video{
    width:70%;max-width:820px;height:auto;
    object-fit:contain;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
  #btn-skip-story{
    font-size:1em;font-weight:800;color:#4a2e0a;
    background:linear-gradient(#FFD86B,#E8A93B);
    border:2px solid #a8791f;border-radius:40px;padding:9px 26px;
    cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.35);
  }
  #banner .icono{width:64px;height:64px;flex:0 0 auto;border-radius:50%;background:#fff;border:2px solid var(--naranja2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  #banner .icono img{width:100%;height:100%;object-fit:contain;}
  #banner .texto{flex:1;color:#4a2e0a;font-size:1.15em;line-height:1.32;font-weight:600;}
  #banner .texto b{font-size:1.25em;display:block;color:var(--naranja2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}

  #gamearea{position:relative;z-index:2;width:100%;display:flex;align-items:stretch;justify-content:center;gap:10px;padding:0 18px 10px;margin-top:15px;flex:1 1 auto;min-height:0;overflow:visible;}

  #mascota-panel{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    width:460px;align-self:flex-end;
  }
  #mascota-panel video{width:100%;height:auto;max-height:100%;object-fit:contain;filter:drop-shadow(0 8px 10px rgba(0,0,0,.35));}

  #wordlist-panel{
    background:rgba(255,244,224,.95);border:3px solid var(--naranja);border-radius:16px;
    padding:14px 16px;min-width:210px;max-width:230px;box-shadow:0 6px 14px rgba(0,0,0,.25);
    align-self:flex-start;max-height:100%;overflow:auto;
  }
  #wordlist-panel h3{margin:0 0 8px 0;color:var(--cafe2);font-size:1em;text-align:center;border-bottom:2px dashed var(--naranja);padding-bottom:6px;}
  #wordlist{list-style:none;margin:0;padding:0;font-size:.92em;}
  #wordlist li{padding:4px 2px;color:#5a4023;font-weight:700;display:flex;align-items:center;gap:6px;}
  #wordlist li:before{content:"●";color:var(--naranja2);font-size:.7em;}
  #wordlist li.found{color:#8a8a8a;text-decoration:line-through;opacity:.6;}
  #wordlist li.found:before{content:"✔";color:var(--verde2);}

  #board-wrap{
    flex:0 1 auto;min-width:0;min-height:0;align-self:stretch;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  #board-box{
    background:rgba(255,244,224,.95);border:3px solid var(--naranja);border-radius:16px;
    padding:14px;box-shadow:0 6px 14px rgba(0,0,0,.25);
    display:inline-flex;max-width:100%;max-height:100%;
  }
  #board{
    display:grid;gap:2px;user-select:none;touch-action:none;
  }
  .cell{
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:1em;color:#4a3316;
    background:#fbe6c2;border-radius:4px;cursor:pointer;
    width:var(--cellpx,34px);height:var(--cellpx,34px);transition:background .1s;
  }
  .cell.selected{background:var(--amarillo);}
  .cell.found{background:var(--verde);color:#08320c;}
  .cell.hidden-found{background:var(--amarillo);color:#4a2e0a;}

  #statsbar{position:relative;z-index:2;display:flex;gap:16px;margin:10px 0 0 0;width:min(1100px,94%);justify-content:center;}
  .stat{flex:1;justify-content:center;background:#fff8ea;border:3px solid var(--naranja);border-radius:30px;padding:8px 22px;font-weight:800;color:var(--cafe2);display:flex;align-items:center;gap:8px;box-shadow:0 4px 8px rgba(0,0,0,.2);}

  /* ---------- WIN LEVEL / FIN ---------- */
  #screen-fin{background:linear-gradient(#fceccb,#f7d9a3);}
  .win-box{background:rgba(255,255,255,.9);border:4px solid var(--naranja);border-radius:22px;padding:34px 48px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.3);}
  .win-box h2{color:var(--cafe2);margin-top:0;}
  .win-box button{margin-top:18px;font-size:1.2em;font-weight:800;color:#fff;background:linear-gradient(var(--naranja),var(--naranja2));border:3px solid #fff;border-radius:40px;padding:10px 34px;cursor:pointer;box-shadow:0 6px 0 #a85315;}
  .win-box button:active{transform:translateY(4px);box-shadow:0 2px 0 #a85315;}

  /* Estos breakpoints ahora se basan en ALTO disponible (no ancho), porque
     el juego siempre se juega en horizontal: el ancho de un celular acostado
     ronda 700-900px, pero el alto es lo que escasea (350-430px típico).
     El tamaño de celda del tablero se calcula dinámicamente por JS
     (fitBoardToContainer en game.js), así que aquí solo ajustamos textos,
     paddings y qué elementos mostrar/ocultar según el espacio. */

  @media (max-height:600px){
    #logo-img{height:90px;}
    #screen-juego{padding-top:96px;}
    #banner{width:min(760px,92%);font-size:.95em;min-height:auto;padding:10px 18px;}
    #statsbar{flex-wrap:wrap;justify-content:center;width:92%;margin-top:6px;}
    .stat{padding:6px 14px;font-size:.9em;}
    #wordlist-panel{min-width:170px;max-width:200px;font-size:.85em;padding:10px 12px;}
    #mascota-panel{width:280px;}
    #gamearea{gap:10px;margin-top:8px;}
  }

  @media (orientation: landscape) and (max-height:480px){
    #logo-img{height:44px;}
    #screen-juego{padding-top:48px;}
    #mascota-panel{width:145px;}
    #banner{min-height:auto;padding:6px 12px;gap:8px;width:min(600px,94%);margin-bottom:6px;}
    #banner .icono{width:34px;height:34px;}
    #banner .texto{font-size:.72em;line-height:1.15;}
    #banner .texto b{font-size:.9em;margin-bottom:0;}
    #gamearea{margin-top:6px;}
    #wordlist-panel{min-width:140px;max-width:170px;padding:8px 10px;}
    #wordlist-panel h3{font-size:.85em;margin-bottom:4px;padding-bottom:4px;}
    #wordlist{font-size:.78em;}
    #wordlist li{padding:2px 0;}
    #board-box{padding:8px;}
    #statsbar{margin-top:4px;}
    #statsbar .stat{padding:4px 10px;font-size:.78em;}
    #btn-sound{width:34px;height:34px;font-size:.95em;top:6px;right:6px;}
  }

  @media (orientation: landscape) and (max-height:360px){
    #logo-img{height:32px;}
    #screen-juego{padding-top:34px;}
    #mascota-panel{width:95px;}
    #banner{padding:4px 10px;gap:6px;}
    #banner .icono{width:26px;height:26px;}
    #banner .texto{font-size:.64em;}
    #banner .texto b{font-size:.85em;}
  }

  @media (orientation:portrait), (max-width:340px){
    #inicio-wrap{max-width:94%;}
    #btn-empezar{font-size:.9em;padding:8px 26px;}
  }

  /* ---------- FORZAR HORIZONTAL ---------- */
  #rotate-overlay{
    display:none;position:fixed;inset:0;z-index:9999;
    background:linear-gradient(#3E2E20,#5C4430);
    align-items:center;justify-content:center;flex-direction:column;gap:18px;
    text-align:center;padding:0 30px;color:#FBE9CE;
  }
  #rotate-overlay .icono-rotar{font-size:4.2em;animation:girar 1.6s ease-in-out infinite;display:inline-block;}
  #rotate-overlay p{font-size:1.15em;font-weight:700;margin:0;max-width:320px;line-height:1.4;}
  @keyframes girar{
    0%,100%{transform:rotate(0deg);}
    50%{transform:rotate(90deg);}
  }
  @media (orientation:portrait){
    #rotate-overlay{display:flex;}
    #app{display:none;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- PANTALLA INICIO -->
  <div class="screen active" id="screen-inicio">
    <div class="velo-inicio"></div>
    <div id="inicio-wrap">
      <img id="inicio-img" src="assets/inicio.png" alt="Bienvenida">
      <button id="btn-empezar">¡Jugar!</button>
    </div>
  </div>

  <!-- PANTALLA JUEGO -->
  <div class="screen" id="screen-juego">
    <div id="velo"></div>
    <img id="logo-img" src="assets/logo.png" alt="Sopa de Letras Electoral">
    <button id="btn-sound">🔊</button>

    <div id="banner">
      <div class="icono"><img id="banner-icon" src="" alt=""></div>
      <div class="texto"><b id="banner-title"></b><span id="banner-def"></span></div>
    </div>

    <div id="maincontent">
      <div id="gamearea">
        <div id="wordlist-panel">
          <h3>Palabras a buscar</h3>
          <ul id="wordlist"></ul>
        </div>
        <div id="board-wrap"><div id="board-box"><div id="board"></div></div></div>
        <div id="mascota-panel">
          <video id="mascota-video" autoplay loop muted playsinline></video>
        </div>
      </div>

      <div id="statsbar">
        <div class="stat">⭐ <span id="score">0</span></div>
        <div class="stat">⏱️ <span id="tiempo">00:00</span></div>
        <div class="stat">🧩 Nivel <span id="nivel-num">1</span>/9</div>
      </div>
    </div>

    <div id="bonus-overlay">
      <video id="bonus-video" muted playsinline webkit-playsinline></video>
    </div>
  </div>

  <!-- PANTALLA FIN DEL JUEGO -->
  <div class="screen" id="screen-fin">
    <div class="win-box">
      <h2>🎉 ¡Completaste la Sopa de Letras Electoral!</h2>
      <p id="fin-msg"></p>
      <button id="btn-reiniciar">Jugar de nuevo</button>
    </div>
  </div>

  <!-- OVERLAY GLOBAL: videos de historia (intro / mitad / final) -->
  <div id="story-overlay">
    <video id="story-video" playsinline webkit-playsinline></video>
    <button id="btn-skip-story">Saltar ➜</button>
  </div>

</div>

<!-- OVERLAY: forzar horizontal -->
<div id="rotate-overlay">
  <span class="icono-rotar">📱</span>
  <p>Gira tu dispositivo para jugar<br>Sopa de Letras Electoral</p>
</div>

<script src="data.js"></script>
<audio id="bg-music" loop></audio>
<script src="game.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((err) => {
        console.warn("No se pudo registrar el service worker:", err);
      });
    });
  }
</script>
</body>
</html>
